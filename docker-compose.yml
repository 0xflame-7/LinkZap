services:
  mongo:
    image: mongo:8
    container_name: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db
    command: mongod --quiet --logpath /dev/null

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    ports:
      - ${PORT:-5000}:5000
      - 9229:9229
    volumes:
      - /usr/src/app/.pnpm-store
      - /usr/src/app/node_modules
    command: pnpm start --verbose # nodemon
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /usr/src/app
          ignore:
            - node_modules/
            - .pnpm-store

        - action: rebuild
          path: ./backend/package.json

        - path: ./backend/Dockerfile
          action: rebuild

        - path: ./backend/src
          action: sync+restart
          target: /usr/src/app/src

volumes:
  mongo_data:
    driver: local
